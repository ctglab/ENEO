name: Testing

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  Testing:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository with submodules
      uses: actions/checkout@v3
      with:
        submodules: recursive
    - name: Decompress test reference fasta
      run: |
        gunzip -kf .test/test_data/genome_chr6.fa.gz
        gunzip -kf .test/test_data/chr6_cdna.fa.gz
    - name: Dry-run workflow
      uses: snakemake/snakemake-github-action@v1.22.0
      with:
        directory: .test
        snakefile: .test/Snakefile
        args: "--configfile .test/config/config.yaml --show-failed-logs --cores 2 --dry-run"
    
